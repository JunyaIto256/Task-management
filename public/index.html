<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>タスク管理</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ログイン/登録オーバーレイ -->
<div id="auth-overlay">
  <div id="auth-box">
    <h1>タスク管理</h1>
    <div id="auth-tabs">
      <button class="auth-tab active" data-tab="login">ログイン</button>
      <button class="auth-tab" data-tab="register">新規登録</button>
    </div>
    <div id="auth-error" class="auth-error hidden"></div>

    <form id="login-form">
      <div class="form-group">
        <label>ユーザー名</label>
        <input type="text" id="login-username" required autocomplete="username">
      </div>
      <div class="form-group">
        <label>パスワード</label>
        <input type="password" id="login-password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn-primary" style="width:100%">ログイン</button>
    </form>

    <form id="register-form" class="hidden">
      <div class="form-group">
        <label>ユーザー名</label>
        <input type="text" id="reg-username" required autocomplete="username">
      </div>
      <div class="form-group">
        <label>パスワード（6文字以上）</label>
        <input type="password" id="reg-password" required autocomplete="new-password">
      </div>
      <button type="submit" class="btn-primary" style="width:100%">登録</button>
    </form>
  </div>
</div>

<!-- メインアプリ -->
<div id="app" class="hidden">
  <header>
    <h1>タスク管理</h1>
    <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
      <span id="current-user" style="font-size:.85rem;color:#64748b;"></span>
      <div id="notification-area">
        <label>通知時刻: <input type="time" id="notify-time" value="08:00"></label>
        <button id="subscribe-btn">通知を有効化</button>
      </div>
      <button id="logout-btn" class="btn-secondary" style="font-size:.82rem;padding:5px 10px;">ログアウト</button>
    </div>
  </header>

  <nav>
    <button class="nav-btn active" data-view="calendar">カレンダー</button>
    <button class="nav-btn" data-view="tasks">タスク一覧</button>
    <button class="nav-btn" data-view="progress">進捗</button>
    <button class="nav-btn" data-view="chat">
      チャット<span id="chat-badge" class="chat-badge hidden">0</span>
    </button>
  </nav>

  <!-- カレンダービュー -->
  <section id="view-calendar" class="view active">
    <div id="calendar-header">
      <button id="prev-month">&lt;</button>
      <h2 id="calendar-title"></h2>
      <button id="next-month">&gt;</button>
    </div>
    <div id="calendar-grid"></div>
    <div id="day-tasks-panel" class="hidden">
      <h3 id="day-tasks-title"></h3>
      <div id="day-tasks-list"></div>
      <button id="add-from-calendar" class="btn-primary">この日にタスク追加</button>
    </div>
  </section>

  <!-- タスク一覧ビュー -->
  <section id="view-tasks" class="view hidden">
    <div class="toolbar">
      <button id="open-add-modal" class="btn-primary">+ タスク追加</button>
      <select id="filter-category">
        <option value="">すべてのカテゴリ</option>
        <option value="work">仕事</option>
        <option value="household">家事</option>
        <option value="leisure">遊び</option>
        <option value="research">研究</option>
        <option value="other">その他</option>
      </select>
      <select id="filter-status">
        <option value="">すべての状態</option>
        <option value="pending">未着手</option>
        <option value="in-progress">進行中</option>
        <option value="completed">完了</option>
      </select>
    </div>
    <div id="task-list"></div>
  </section>

  <!-- 進捗ビュー -->
  <section id="view-progress" class="view hidden">
    <h2>進捗サマリー</h2>
    <div id="progress-overall"></div>
    <div id="progress-charts"></div>
  </section>

  <!-- チャットビュー -->
  <section id="view-chat" class="view hidden">
    <div id="chat-messages"></div>
    <div id="chat-input-area">
      <textarea id="chat-input" placeholder="メッセージを入力… (Enter送信 / Shift+Enterで改行)" rows="1"></textarea>
      <button id="chat-send" class="btn-primary">送信</button>
    </div>
  </section>
</div>

<!-- タスク追加/編集モーダル -->
<div id="modal-overlay" class="hidden">
  <div id="modal">
    <h2 id="modal-title">タスク追加</h2>
    <form id="task-form">
      <input type="hidden" id="task-id">
      <div class="form-group">
        <label>タイトル *</label>
        <input type="text" id="f-title" required placeholder="タスク名を入力">
      </div>
      <div class="form-group">
        <label>説明</label>
        <textarea id="f-description" placeholder="詳細（任意）"></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>カテゴリ</label>
          <select id="f-category">
            <option value="work">仕事</option>
            <option value="household">家事</option>
            <option value="leisure">遊び</option>
            <option value="research">研究</option>
            <option value="other">その他</option>
          </select>
        </div>
        <div class="form-group">
          <label>優先度</label>
          <select id="f-priority">
            <option value="high">高</option>
            <option value="medium" selected>中</option>
            <option value="low">低</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>期日</label>
          <input type="date" id="f-due-date">
        </div>
        <div class="form-group">
          <label>状態</label>
          <select id="f-status">
            <option value="pending">未着手</option>
            <option value="in-progress">進行中</option>
            <option value="completed">完了</option>
          </select>
        </div>
      </div>
      <div class="modal-actions">
        <button type="submit" class="btn-primary">保存</button>
        <button type="button" id="close-modal" class="btn-secondary">キャンセル</button>
      </div>
    </form>
  </div>
</div>

<!-- 既読者ポップオーバー -->
<div id="readers-popup" class="hidden">
  <div id="readers-list"></div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="app.js"></script>
</body>
</html>
